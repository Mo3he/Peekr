<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Peekr icon light">
      
    <defs>
      <linearGradient id="bg-light" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#f3f3f6"></stop>
        <stop offset="0.6" stop-color="#e9e9ed"></stop>
        <stop offset="1" stop-color="#dcdce2"></stop>
      </linearGradient>

      <linearGradient id="glass-light" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="rgba(70,74,84,0.97)"></stop>
        <stop offset="0.5" stop-color="rgba(95,99,110,0.97)"></stop>
        <stop offset="1" stop-color="rgba(140,144,154,0.97)"></stop>
      </linearGradient>

      <linearGradient id="edge-light" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="rgba(255,255,255,0.45)" stop-opacity="0.55"></stop>
        <stop offset="1" stop-color="rgba(255,255,255,0.45)" stop-opacity="0.85"></stop>
      </linearGradient>

      <linearGradient id="hi-light" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0.65"></stop>
        <stop offset="1" stop-color="#ffffff" stop-opacity="0"></stop>
      </linearGradient>

      
      <filter id="drop-light" x="-20%" y="-20%" width="140%" height="160%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="5"></feGaussianBlur>
        <feOffset dx="0" dy="5" result="off"></feOffset>
        <feComponentTransfer in="off" result="sh">
          <feFuncA type="linear" slope="0.16"></feFuncA>
        </feComponentTransfer>
        <feMerge>
          <feMergeNode in="sh"></feMergeNode>
          <feMergeNode in="SourceGraphic"></feMergeNode>
        </feMerge>
      </filter>

      <filter id="glow-light" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="14"></feGaussianBlur>
      </filter>

      
        <radialGradient id="dot-light-0" cx="0.35" cy="0.30" r="0.85">
          <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"></stop>
          <stop offset="0.25" stop-color="#34c759"></stop>
          <stop offset="1" stop-color="#34c759"></stop>
        </radialGradient>
      
        <radialGradient id="dot-light-1" cx="0.35" cy="0.30" r="0.85">
          <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"></stop>
          <stop offset="0.25" stop-color="#ffcc00"></stop>
          <stop offset="1" stop-color="#ffcc00"></stop>
        </radialGradient>
      
        <radialGradient id="dot-light-2" cx="0.35" cy="0.30" r="0.85">
          <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"></stop>
          <stop offset="0.25" stop-color="#ff453a"></stop>
          <stop offset="1" stop-color="#ff453a"></stop>
        </radialGradient>
      

      <pattern id="grid-light" width="64" height="64" patternUnits="userSpaceOnUse">
        <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#000000" stroke-opacity="0.04" stroke-width="1"></path>
      </pattern>
    </defs>
  
      <rect width="1024" height="1024" fill="url(#bg-light)"></rect>
      
