<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Peekr icon dark">
      
    <defs>
      <linearGradient id="bg-dark" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#2c2c2f"></stop>
        <stop offset="0.6" stop-color="#1d1d20"></stop>
        <stop offset="1" stop-color="#101013"></stop>
      </linearGradient>

      <linearGradient id="glass-dark" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="rgba(255,255,255,0.22)"></stop>
        <stop offset="0.5" stop-color="rgba(255,255,255,0.08)"></stop>
        <stop offset="1" stop-color="rgba(255,255,255,0.14)"></stop>
      </linearGradient>

      <linearGradient id="edge-dark" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="rgba(255,255,255,0.60)" stop-opacity="0.95"></stop>
        <stop offset="1" stop-color="rgba(255,255,255,0.60)" stop-opacity="0.4"></stop>
      </linearGradient>

      <linearGradient id="hi-dark" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"></stop>
        <stop offset="1" stop-color="#ffffff" stop-opacity="0"></stop>
      </linearGradient>

      
      <filter id="drop-dark" x="-20%" y="-20%" width="140%" height="160%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="4"></feGaussianBlur>
        <feOffset dx="0" dy="4" result="off"></feOffset>
        <feComponentTransfer in="off" result="sh">
          <feFuncA type="linear" slope="0.3"></feFuncA>
        </feComponentTransfer>
        <feMerge>
          <feMergeNode in="sh"></feMergeNode>
          <feMergeNode in="SourceGraphic"></feMergeNode>
        </feMerge>
      </filter>

      <filter id="glow-dark" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="14"></feGaussianBlur>
      </filter>

      
        <radialGradient id="dot-dark-0" cx="0.35" cy="0.30" r="0.85">
          <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"></stop>
          <stop offset="0.25" stop-color="#34c759"></stop>
          <stop offset="1" stop-color="#34c759"></stop>
        </radialGradient>
      
        <radialGradient id="dot-dark-1" cx="0.35" cy="0.30" r="0.85">
          <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"></stop>
          <stop offset="0.25" stop-color="#ffcc00"></stop>
          <stop offset="1" stop-color="#ffcc00"></stop>
        </radialGradient>
      
        <radialGradient id="dot-dark-2" cx="0.35" cy="0.30" r="0.85">
          <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"></stop>
          <stop offset="0.25" stop-color="#ff453a"></stop>
          <stop offset="1" stop-color="#ff453a"></stop>
        </radialGradient>
      

      <pattern id="grid-dark" width="64" height="64" patternUnits="userSpaceOnUse">
        <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"></path>
      </pattern>
    </defs>
  
