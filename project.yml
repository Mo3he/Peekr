name: HSM
options:
  bundleIdPrefix: net.mohome
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: KTX2SJ3P98
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    STRING_CATALOG_GENERATE_SYMBOLS: "YES"

targets:
  HSM:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HSM/Sources
      - path: HSM/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mohome.hsm
        # Catalyst gets a distinct bundle ID so it can coexist with the iOS app on
        # the same Mac. Replaces the now-deprecated DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER.
        "PRODUCT_BUNDLE_IDENTIFIER[sdk=macosx*]": maccatalyst.net.mohome.hsm
        INFOPLIST_FILE: HSM/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        ENABLE_DEBUG_DYLIB: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "YES"
    entitlements:
      path: HSM/HSM.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)net.mohome.hsm
        com.apple.security.application-groups:
          - group.net.mohome.hsm
    dependencies:
      - target: HSMWidget
        embed: true

  HSMWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HSMWidget/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mohome.hsm.widget
        INFOPLIST_FILE: HSMWidget/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "YES"
        "PRODUCT_BUNDLE_IDENTIFIER[sdk=macosx*]": maccatalyst.net.mohome.hsm.widget
        INFOPLIST_KEY_NSExtensionPrincipalClass: HSMWidgetBundle
    entitlements:
      path: HSMWidget/HSMWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.net.mohome.hsm

schemes:
  HSM:
    build:
      targets:
        HSM: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  HSMWidget:
    build:
      targets:
        HSMWidget: all
    run:
      config: Debug
      environmentVariables:
        - variable: _XCWidgetKind
          value: HSMMonitorWidget
          isEnabled: true
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
