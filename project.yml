name: Peekr
options:
  bundleIdPrefix: com.peekr
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: KTX2SJ3P98
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
    SWIFT_EMIT_LOC_STRINGS: "YES"

targets:
  Peekr:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Peekr/Sources
      - path: Peekr/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mohome.peekr
        # Catalyst gets a distinct bundle ID so it can coexist with the iOS app on
        # the same Mac. Replaces the now-deprecated DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER.
        "PRODUCT_BUNDLE_IDENTIFIER[sdk=macosx*]": maccatalyst.net.mohome.peekr
        INFOPLIST_FILE: Peekr/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        ENABLE_DEBUG_DYLIB: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "YES"
    entitlements:
      path: Peekr/Peekr.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)net.mohome.peekr
        com.apple.security.application-groups:
          - group.net.mohome.peekr
    dependencies:
      - target: PeekrWidget
        embed: true

  PeekrWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PeekrWidget/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.mohome.peekr.widget
        INFOPLIST_FILE: PeekrWidget/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_NSExtensionPrincipalClass: PeekrWidgetBundle
    entitlements:
      path: PeekrWidget/PeekrWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.net.mohome.peekr

schemes:
  Peekr:
    build:
      targets:
        Peekr: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  PeekrWidget:
    build:
      targets:
        PeekrWidget: all
    run:
      config: Debug
      environmentVariables:
        - variable: _XCWidgetKind
          value: PeekrMonitorWidget
          isEnabled: true
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
