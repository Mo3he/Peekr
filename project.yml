name: Peekr
options:
  bundleIdPrefix: com.peekr
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Peekr:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Peekr/Sources
      - path: Peekr/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mblieden.peekr
        INFOPLIST_FILE: Peekr/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        ENABLE_DEBUG_DYLIB: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "YES"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "YES"

  PeekrWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PeekrWidget/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mblieden.peekr.widget
        INFOPLIST_FILE: PeekrWidget/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_NSExtensionPrincipalClass: PeekrWidgetBundle
    dependencies:
      - target: Peekr
        embed: false
